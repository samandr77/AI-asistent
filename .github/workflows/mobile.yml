name: mobile

on:
  push:
    paths:
      - "second-brain/mobile/**"
      - ".github/workflows/mobile.yml"
  pull_request:
    paths:
      - "second-brain/mobile/**"
      - ".github/workflows/mobile.yml"

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: second-brain/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: second-brain/mobile/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Jest
        run: npx jest --ci
      - name: ESLint (i18n literal-string rule)
        run: npx eslint app components services --max-warnings=0
      - name: No raw Cyrillic outside locales
        run: |
          set -euo pipefail
          if leaks=$(grep -rEn '[А-Яа-я]' app components services 2>/dev/null) && [ -n "$leaks" ]; then
            echo "::error title=Untranslated Cyrillic strings::Move them into locales/*.json and use t('namespace.key')."
            echo "$leaks"
            exit 1
          fi
