name: mobile

on:
  push:
    paths:
      - "second-brain/mobile/**"
      - ".github/workflows/mobile.yml"
  pull_request:
    paths:
      - "second-brain/mobile/**"
      - ".github/workflows/mobile.yml"

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: second-brain/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: second-brain/mobile/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Jest
        run: npx jest --ci
      - name: ESLint (i18n literal-string rule)
        continue-on-error: true  # soft gate until full i18n migration is done
        run: npx eslint app components services --max-warnings=0
      - name: No raw Cyrillic outside locales
        continue-on-error: true  # soft gate until full i18n migration is done
        run: |
          set +e
          leaks=$(grep -rE '[А-Яа-я]' app components services || true)
          leaks=$(echo "$leaks" | grep -v '/locales/' || true)
          if [ -n "$leaks" ]; then
            echo "::warning title=Untranslated Cyrillic strings::"
            echo "$leaks" | head -40
            echo ""
            echo "Move these into locales/*.json and use t('namespace.key')."
          fi
