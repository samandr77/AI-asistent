name: mobile

on:
  push:
    paths:
      - "second-brain/mobile/**"
      - ".github/workflows/mobile.yml"
  pull_request:
    paths:
      - "second-brain/mobile/**"
      - ".github/workflows/mobile.yml"

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: second-brain/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: second-brain/mobile/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Jest
        run: npx jest --ci
